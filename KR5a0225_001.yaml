body:
  text: 道宗統系元始天王元始者實爲至道之髙稱萬道之根本也虚无鬱秀開圖帝先玄都玉山上京清微天宮龍漢劫中御大羅玄元寳臺清華妙元之殿授玉宸道君以清微妙玄之道太上老君以玄都應運玉䇿玉宸道君乃靈寳帝尊上古立運之前太元生化之宗也融結萬品朗耀英鮮都大羅玉京山禹餘天宮妙炁至玄授真元妙化天帝以清微通真玉式紫宸太華天帝以飛玄樞機寳章真元妙化天帝諱奕乃妙化天主都洞妙寳化宮又元始萬神宮玉虚明皇道君諱邦旭乃緫仙上真玄中大法師也主天樞省事太玄玄一真人諱鬱羅翹又朗𠃔𢍆乃玉清妙道天君以瓊臺召靈之章居龍梵宮主玄都應明府又妙道金元宮太玄玄二真人諱光妙音又覺真軒乃上清妙化天君以妙道神仙内法居普照宮主玄都宗薈府又妙化崇章宮太玄玄三真人諱真定光又嚞西元乃太清妙感天君以明道應化樞㫖居廣清宮主玄都正昌府又妙感崇延宮清微通光大妙天帝諱瓊宏居玉清通元宫泓靈元化洞妙天帝諱扶髙勻居上清元化宮又元化洞玄宮神曜冲一丹剛天帝諱炳育居玉京神丹宮又冲一宮清微平天緫道皇帝朱昌行居定宏中宮清微洞陽曜光皇帝諱完都天官化身居元陽宮通明昭烈天玄上帝康完臣居天曹上明宮太微演化崇明妙感帝君端良居太微演完宮浮光曜真洞明天帝龍冲一居洞寅宮天曹儲福廣化威明元君許昭立主天曹景命府又天曹化命府天曹儲福洪靈斡化上聖元君趙順主天曹儲福府丹赤和光衝天太阜元君章孔實一名九天元恭聖母居九天元靈宮九天冲和明道飛雷掣電通化元君卜超祖一名九天上靈真妃居九天定福中宮南陵浮光天官諱朗期唐時降於西京主南極浮光宮炎明洞靈回曜天君諱復奕主洞陽炎明宮太陽暘谷神王諱璣中居長桑林下暘谷之壇萬變九真玉仙聖母太素元君石杰昭居玉西臺玄光山上明宮主巫山福源宮冲玄應運金元洞耀元君暉主保真宮通英演雲端化妙感元君暄主靈真宮神妙廣惠道光崇化元君昫主太真宮凝雲膺阜清輝昌一元君泓主緫真宮玄昌靈官冲化龍光希和元君洪主雲真宮真一太和晃雲回景元君沒主威真宮形變清玄洪明宗諒元君淑主含真宮朱陵丹剛魏霄妙和元君熛主元真宮紫靈光惠混神自明元君爟主道真宮虚化昭隆寂空梵照元君煇主育真宮茂育崇清虚廣照冲平一元君燧主髙真宮玄都明和洞清太光元君郭勤一名九天玄女主玄初太光宮清微泓照洞清元君傅惠祈主玉京泓照宮清微太華明運元君韓俊居太華道元宮九光神運自然玄照元君楊熈幽州人主神運元照宮紫清金光儲慶好道元君沈宗清齊人主紫元福華宮紫霞丹光雷首電光元君蘇剛主紫霞雷明宮太一茂隆自然通化元君管方仲東京人主太一通明宮宗昌福原元君姚郁主玄明宗福宮護明元妃玉隆丹剛清華紫光道君王說字决南京人乃玄光聖母主四溟事唐降居東海景清宮主西華元妙宮太清泰玄元君文鏞主景輝太和宮授祖元君靈寳流系玉宸道君紫宸太華天帝諱宗昶乃泰華天王主都太微華明宮東華司命青童道君諱阿婁羅乃東華木公居方諸宮主神仙道籍三天顯道律令天帝方式遂乃青靈始老主玉天令元宮大有妙玄冲道自然天帝東垕乃東斗前一星主大有冲照宮紫微九照飛玄内化天帝髙膺則蔡州人居南海中主九照剛宏府泰靈洞光明運普照天帝龔宗卿主運精府西城洞明真人王褒乃金闕上宰主金闕城昌宮左府又西城緫英府緫真真人王速字方平乃小有洞天主居明育煿爟宮又清和元陽府髙元宸照紫虚元君魏華存字賢安晋人魏舒女主金闕紫章丹㑹府居髙元宸照宮又大丹宮形變樞機紫光安明元君歐陽長勝鳯翔府人主安明宮紫泓周運昇和清玄元君湯宗朝梓州人主神州陵光府儲慶保福洞光宗朝元君龍炎道州人主天山元照府九天神宏通明廣冲真君林昌卿大明府人主廣冲府天華冲靈紫靈華陽玄應真君陳煥然彭州人主天華冲靈府上清玄曜浮丘元勲真君熈主紫明府冲和太元洞靈天元真君張壬通壽州人主和靈府紫皇冲靈太明内元元君朱欽賢瓊州人主紫皇保生府龍光普照洞華元君汪淑道漢州人居洞華宮九天洞明元君許齡卿秦降劒州主九天洞清育玄宮九天隆玄太明通和元君余果鄂州人主九天太明府九天妙道真運元君楊徹秦降河中府樞轄雷霆爲帥主九天長原宮冲妙丹化玄和自然元君柳崇中朱崖軍人主九龍丹和宮紫微霞光妙感洞輝元君宋希仙廣州人主霞光明良府居南離農山玉堂真人朱軒東京人主太清宮鳯凰閣玄靈宫居金華山鬱華景林真人楊茂中西京人主景林元昌府居東海山青惠昭化扶桑真君卜冀隨州人主昭靈府角亢星中居東華上佐司命真人楊羲和主洞陽端靈右府又東華司命府東華上相上清仙翁許翽主紫陽極玄宮紫靈妙道炎明洞光元君謝晉剛主紫靈天化府洞真萬福元君紀師正主太虚洞清宮上清元君西華聖母諶嬰早登仙籍闡孝道明王之教主丹陽諒光宮應化姓氏不一髙明大使天機内相許遜受諶元君招真上明玉章得道於八月十五日㧞宅上昇主天機省居玉都清慶宮洪州人見本傳祖元君道德流𣲖太上老君乃道德至尊萬法之祖玄炁所生功宰難名都大羅金華山大赤天宮化身度關授文始先生關令真人以清微運玄經周代人關令真人姓尹諱喜著書行于世預知紫炁開祥際遇犢車親傳玄妙主大樞中宮後授泰明清惠真人師復乃東華帝君應化漢州降生主龍丘山通明洞在東海廣桑山又皇清府西華通惠元君龐俏道漢州綿竹縣庚除治人主西華廣聖宮元靈廣玄道妙和元君商茱彭州人主雲陽府碧靈