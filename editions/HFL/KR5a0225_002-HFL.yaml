body:
  text: 簡式救苦簡十二品用梓木丹書青袋帝王登真第一億光普照參龍元敕行元始符命金籙玉簡青英妙道真符告下方諸洞霞明華光元之天太霞扶桑君暘谷重元靈君左鬱華上真右青谷上真上啓皇帝參朝道寳與真洞明一如告命太歲年月日具位臣姓某告行后妃登真第二元始應化龍文煥明行元始符命金籙金簡冲真九陽真符告下金靈元宏碧昌之天太丹金元萬炁圖仙元君三華九惠七暎十明太釋隆昭上真謹啓后妃參朝師寳克證仙真一如告命太歲年月日具位臣姓某告行度公侯將相一品三品命婦及三洞籙宫髙士第三九陽太運度品清真敕行元始符命金籙白簡九龍真符告下朱明紫素煌燿之天和陽赤明昌陽育明元景上真超度某人乗兹妙典復性生真超昇仙境名上清都一如告命太歲年月日具位臣姓某告行度品官命婦四輔正一籙官髙士第四元始符命金籙白簡九龍真符告下玄英樞機應靈元華之天紫微春景元皇清晨玉靈上真㧞度某人參朝靈寳獲遂登真一如告命太歲年月日具位臣姓某告行生身受度第五青華鬱化昇度與真敕行元始符命金籙白簡九龍真符告下北元景緯瑞光紫篕之天玄華鎭隂洞官風澤靈淵應明至真㧞度預修某人劫劫長存超凌三界逍遥玉臺一如告命太歲年月日具位臣姓某告行保國度難消息兵戈第六龍文胎化映度青玄敕行元始符命金籙白簡九龍真符吿下蓬玄太空之天五嶽四瀆九州八埏名山大川地祇百靈衆真永保國祚奠安邦境一如吿命太歲年月日具位臣姓某吿行度侍從卿監郎官朝貴監司守位官品命婦第七元始符命金籙白簡九龍真符吿下太華瓊英七暎之天瓊華上真玄靈元冥十華境分九靈太明自然之神㧞度某人神參紫闕名上丹章一如告命太歲年月日具位臣姓某吿行度邑宰官職命婦道流籙士第八威符龍還魂神生真敕行元始符命金籙白簡九龍真符吿下十方无極世界三官九署百二十曹五帝考官九隂主者隂景神靈㧞度某人神參仙域名記紫文一如告命太歲年月日具位臣姓某吿行㧞贖沈滯百姓士民第九元始符命金籙白簡救苦真符告下十方无極世界三官九府百二十曹五帝考官九幽地獄臣天力士執罰神兵司命司録司功司殺牛頭獄卒三界大魔㧞度某人岀離地獄永辭長夜覩見光明萬罪蕩除𡨚仇和釋乗此九真妙戒㧞度功德上昇天堂一如告命太歲年月日具位臣姓某吿行度凶横非命傷亡第十元始符命金籙白簡救苦真符告下洞淵隂臺北靈玄運之司十元八宏掾佐諸神㧞度某人出離惡趣魂識洞清萬罪蕩除𡨚仇和釋乗此某籙解度功徳上生天堂一如告命太歲年月日具位臣姓某告行通用第十一詰文同前拔贖士民第九濟㧞血湖第十二元始符命金籙白簡九龍真符告下清英萬炁緫真之天金闕太隆華精曲素諸真黄華浩地紫元崇臺夜光夫人㴠清妙宏仙真㧞度某人速離迷徑克證生方真惠洞明善源澄正乗此黄籙功徳上昇天堂一如告命太歲年月日具位臣姓某吿行長生簡十二品栢木朱書青袋用金龍吏帝王登真第一元始符命金籙玉簡長生玉暦保真靈符吿下清微洞陽之天紫清皇曜九炁九真元陽玉晨薈道三尊萬神上啓皇帝參真契道克獲生神龍文結炁上昇玉京一如告命金龍驛傳太歳年月日具位臣姓某吿行后妃登真第二元始符命金籙金簡紫詔丹華靈符吿下太皇元明之天耀清混英妙化洞英諸尊萬神謹啓后妃參真合道上昇紫清一如吿命太歲年月日具位臣姓某吿行度公侯將相一品二品命婦三洞籙官髙士第三元始祖炁保生長靈敕符元始符命金籙白簡長生靈符告下南極元光曲真三陽玉陵之天昌陽三品百英帝真超度某人上登朱陵一如告命太歲年月日具位臣姓某告行度品官命婦四輔正一籙官髙士第四天寳應運長生道真敕符元始符命金籙白簡長生靈符告下朱陵周運太丹之天三十六元煌暉天真超凌某人上登朱宫一如告命太歲年月日具位臣姓某告行生身受度第五元始妙道和陽運生敕行元始符命金籙白簡長生靈符告下九都玉陽之天六司八弼輔真萬化諸君超度預修某人劫劫長存隨劫輪轉㕘真悟道上登朱陵一如告命太歳年月日具位臣姓某告行保國度難消息兵戈第六清微應命炁生長存敕符元始符命金籙白簡長生靈符告下紫微碧玉泰玄之天太一帝君十元太一天君青門黄闕紫禁黒關龍衛虎轅天真集諸貴神保度國安民豐欣樂太平一如告命太歲年月日具位臣姓某告行星辰告下經緯洞陽鬱儀洞隂結璘五星四曜北斗南辰諸真解度如何或某法雷真如何度侍從卿監郎官朝貴監司守倅命婦第七洞真元混化合生神敕符元始符命金籙白簡長生靈符告下南極虚明昌華之天陽元赤混緫真帝靈超度某人叅真悟道上登南宫一如告命太歲年月日具位臣姓某告行度邑宰官職命婦道流籙士第八元皇運真炁生神敕符元始符命金籙白簡長生靈符告下南方丹天世界朱陵火府南昌上宫長生大君韓君司馬司命司録延壽益筭度厄尊神廻骸起死監生大神超度某人上登朱宫流火之庭玉眸鍊質黄華蕩形書名紫䇿受化更生乗此金籙度命功德時刻昇遷一如告命太歲年月日具位臣姓某告行㧞贖沈滯百姓小民第九誥文同前元炁始玄生真與靈敕符度凶横非命傷亡第十誥文同前元始妙炁生靈育真通用第十一誥文同前元始符命震章敕靈濟㧞血湖第十二誥文同前元始符命清朗洞明角封式用青紙作謹元始符命具位臣姓某承誥奉行封背式長生靈符告下某天或某處關發式元景丹天府天猷紫皇神一天君主龍吏所合箋聞差用某宮某府分司今準元降元始符命金籙白簡救苦真符㧞度某人上昇天宫者元始符命金籙白簡長生靈符超度某人上登天宫者右關茭龍驛吏若干人齎持符命速逹天宮昭示宸貺故關太歲年月日時關救苦簡關前符用黄紙闊三寸朱書黏在關前敕烈神用茭龍吏長生簡關前符敕捷神用金龍吏召茭龍吏髙宏乃茭龍之緫髙某臣某召金龍吏彬益乃金龍之緫彬某臣某議簡簡籙功及幽㝠不可具述獨張麗華事尤爲昭著記云誦經至九過適當懴罪之時遂𤑔簡䟽則奏簡當在功徳成就之時明矣近有方發奏之時先取救苦符盡焚𤑔以爲亡者出離地獄義有未安蓋抽魂自有文牒白簡當在傳度時宣吿使亡者乗道場所作功德及願持戒懴悔自新之力然後奠簡告下十方赦罪釋𡨚自此方爲出離地獄上登朱宫爾故經云九幽地獄衆生聞北帝廣爲啓請心生悔過願求解脫天尊方爲說戒給符此尤可據又念呪篆符不爲難事但能篆二十四面即可記憶蓋符呪意義相合故也人能甞試之則知此言不妄三元簡三面上元簡完亮照耀細軾帝庭元始符命清微内篆三天玉簡告聞上元天官太極宫三十六曹考司典掾㧞度預㑹附薦某等神魂普及沈滯幽魂苦爽出離天囚徑詣真都滌除過咎朝謁髙清金籙寳符三界遵承一如吿命金龍驛傳太歳年月日具位臣姓某吿行中元簡冠軾魁茂攝禁朝宗元始符命清微内篆三天玉簡告聞中元地官清虚宫四十二曹考司典吏㧞度某魂普及沈滯幽魂苦爽出離地户乗沐陽光金籙寳符三界遵承一如吿命金龍驛傳太歳年月日具位臣姓某告行下元簡烈玄帝命生化萬真元始符命清微内篆三天玉簡告聞下元水官洞源宫四十二曹考司典吏㧞度某等神魂普及沈滯幽魂苦爽出離苦趣超生福庭金籙寳符三界遵承一如告命金龍驛傳太歳年月日具位臣姓某告行九天簡或緫一面或分九面並同式清朗昭仞炁育明泓整飛元始符命金籙白簡清微開明真符告下某天髙上至真超度某魂飛神謁帝真惠洞明上生天堂一如吿命太歲年月日具位臣姓某告行十方簡或散或緫角封並同九天式婁徑由漠洪鎭威冲廣元元始符命黄籙白簡清微濟玄太泓真符告下某方无極世界㧞度某人神度紫府名上丹庭一如告命太歲年月日具位臣姓某告行三十二天簡或四面或散用誥文角封並同九天式東方八天森亮涵泓暉奕互聖南方八天符庚鎬復倞灼彬煇西方八天晶髙元渾泓恊鳥通北方八天合拱惒岳杰羅遷三界簡正奏發太丹運化玉符應升元始符命清微玉篆太丹簡符吿下蓬玄太空天君佐命儲副真君泰山府君司命真君上殿炳靈公西齊王蒿里丈人諸司曹僚典者掾佐等神㧞度九州五姓沈滯幽魂苦爽以及預㑹附薦神魂出離幽夜赦滌罪愆神度紫府名上南庭玉文到處金龍驛傳水府吿下水府龍庭九江四瀆八海五湖溪源潭洞澤谷龍庭合𨽻攸司㧞度同前土府告下九壘幽扃朔單鬱絶風澤洞虚有司主者㧞度同前散壇山水土簡璧式山天青圓土黄方水玄六角山簡告下岳峙山鎭萬神敕靈鎭謹爲某處某人以今月某日值某之辰命某等修建靈寳大齋醮自某日蕆事至某日滿散今則行道事竟投簡某山願神願仙長生度世飛行上清五嶽真人至聖至靈乞削罪録上名九天請詣靈山金龍驛傳太歲年月朔日時具位臣姓某於某山某洞天吿聞土簡吿下土皇九壨三十六萬神敕安鎭謹爲同前詞願神願仙中皇九土戊已黃神土府五帝乞削罪名請詣中宫勒簡太玄金紐白信金龍驛傳太歲年月同前於某家住宅中宫土府告聞水簡告下水宫府院亭閣龍潭萬神敕合神謹爲同前詞願神願仙三元洞府九江水帝十二河源江河淮瀆溟泠大神乞削罪錄上名九天恭詣水府金龍驛傳太歲年月同前於某潭某江告聞告簡焚後符祝之土鎭水潭山神右仙家修鍊之始先投簡於三府乞削過録功故有願神願仙之語前賢取壇中告畢齋功重明志願亦爲佳事以槿木爲簡以表潔志以金龍負簡又當如簡之長廣作虚中板底牀以置簡上置龍於虚中處以負簡有以土府龍則坐而鎮宅蓋俗論也所謂金龍驛傳豈有坐而能傳置也以青絲代截髮青絲毎簡用二丈四尺繫簡縻龍三府各有匝數金紐二十一口毎一簡用七口結於絲上爲龍之銜勒以表堅固之義加璧以致敬禮重幣也天府璧圓而青土府璧方而黃水府璧玄而六出象水之成數也玉誥式紫宸玄上玉元真誥黃素丹書據入意除巳謹按真科宣行道範仰紫清而傳戒俯玄澤以垂章用闡金元廣行玉誥敕頒清赦妙逹生方右誥泄自太虚降流八極是以宣演玉元用之攝行金格上請紫宸丹剛妙有天君紫宸丹剛妙元天君紫宸鬱華九炁天君紫宸絳章三炁天君紫宸皓靈七炁天君紫宸玄真五炁天君紫宸黄陽一炁天君紫宸三十六混明皇道君超度某魂出離幽夜覩見光明飛神煉質育鍊精英上生紫極遊宴丹庭一如告命太歲年月朔日時吿行具位臣姓某承誥奉行列師銜元上虚元自然寳誥黄素朱書恭奉元降天寳君靈寳君神寳君敕㧞度某人上生福庭如預修改云延生度厄生身受度劫劫長存一如吿命右九天之章三洞飛玄之炁超度某人宿命帝圖返本合元一一長存逍遥自在與道合真一如誥文風火驛傳太歲年月朔日時告行具位臣娃某承誥奉行列師銜太陽誥太陽洞煌鬱曜流光玉誥恭奉元降洞煌玉篆誥命奏爲某處某人與預會等崇建靈寳太齋醮昇度各家祖禰先靈普超沈滯幽爽仰祈飛度格命欎儀陽光回真右誥洞煌昭運廣暎十方鬱儀金暉妙應南昌上啓洞陽鬱儀炎光帝君日宫三十二天緫華諸帝君䇿景丹光元令真宰伏依玉誥奉命清陽即使某人廻魂度魄神上黃元三化九錬升入天關炎光真炁澄正流芳急急如元始上帝玉宸道君敕太歳年月朔日時告行具位